---
# Dedicated LoadBalancer service for syslog ingestion.
# External devices send to <EXTERNAL-IP>:514 (standard syslog port).
# MetalLB assigns an IP from the k8s-vlan pool (10.0.50.200-250).
apiVersion: v1
kind: Service
metadata:
  name: alloy-syslog
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/component: syslog
spec:
  type: LoadBalancer
  # Preserve the original client IP so Alloy sees the real source address
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/instance: alloy
    app.kubernetes.io/name: alloy
  ports:
    - name: syslog-tcp
      protocol: TCP
      port: 514
      targetPort: 1514
    - name: syslog-udp
      protocol: UDP
      port: 514
      targetPort: 1514
