---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 30m
  chart: 
    spec:
      chart: alloy
      version: '>=1.0.0 <2.0.0'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    configMapGenerator:
    - name: alloy
      files:
        - config.alloy
      options:
        disableNameSuffixHash: true
    alloy:
      extraPorts:
        - name: syslog-tcp
          port: 1514
          targetPort: 1514
          protocol: TCP
        - name: syslog-udp
          port: 1514
          targetPort: 1514
          protocol: UDP
      configMap:
        content: |-

          loki.write "default" {
            endpoint {
              url = "http://loki:3100/loki/api/v1/push"
            }
          }

          // ──────────────────────────────────────────────
          // Syslog collection
          // ──────────────────────────────────────────────

          // Relabel rules to promote internal __syslog_* labels so they survive
          // the label drop that happens before log entries leave the component.
          // These rules are applied via relabel_rules= on each loki.source.syslog,
          // BEFORE the __ prefix strip. The forward_to here is required by the
          // component but unused in the data flow.
          loki.relabel "syslog" {
            forward_to = []

            // Preserve the sender's IP address
            rule {
              source_labels = ["__syslog_connection_ip_address"]
              target_label  = "source_ip"
            }

            // Syslog header fields (only set when non-empty)
            rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "syslog_hostname"
              regex         = "(.+)"
            }
            rule {
              source_labels = ["__syslog_message_app_name"]
              target_label  = "syslog_app"
              regex         = "(.+)"
            }
            rule {
              source_labels = ["__syslog_message_severity"]
              target_label  = "severity"
              regex         = "(.+)"
            }
            rule {
              source_labels = ["__syslog_message_facility"]
              target_label  = "facility"
              regex         = "(.+)"
            }
          }

          // Add static labels (cluster, job) and forward to Loki
          loki.process "syslog" {
            stage.static_labels {
              values = {
                cluster = "wilsonfi-prod",
                job     = "syslog",
              }
            }
            forward_to = [loki.write.default.receiver]
          }

          // TCP listener – RFC5424 (modern structured syslog)
          loki.source.syslog "syslog_tcp" {
            listener {
              address               = "0.0.0.0:1514"
              protocol              = "tcp"
              label_structured_data = true
              use_incoming_timestamp = true
              labels                = { transport = "tcp" }
            }
            relabel_rules = loki.relabel.syslog.rules
            forward_to    = [loki.process.syslog.receiver]
          }

          // UDP listener – RFC3164 (legacy BSD syslog, used by most network gear)
          loki.source.syslog "syslog_udp" {
            listener {
              address               = "0.0.0.0:1514"
              protocol              = "udp"
              syslog_format         = "rfc3164"
              use_incoming_timestamp = true
              rfc3164_default_to_current_year = true
              labels                = { transport = "udp" }
            }
            relabel_rules = loki.relabel.syslog.rules
            forward_to    = [loki.process.syslog.receiver]
          }
   
          // local.file_match discovers files on the local filesystem using glob patterns and the doublestar library. It returns an array of file paths.
          local.file_match "node_logs" {
            path_targets = [{
                // Monitor syslog to scrape node-logs
                __path__  = "/var/log/syslog",
                job       = "node/syslog",
                node_name = sys.env("HOSTNAME"),
                cluster   = "wilsonfi-prod",
            }]
          }

          // loki.source.file reads log entries from files and forwards them to other loki.* components.
          // You can specify multiple loki.source.file components by giving them different labels.
          loki.source.file "node_logs" {
            targets    = local.file_match.node_logs.targets
            forward_to = [loki.write.default.receiver]
          }
          // discovery.kubernetes allows you to find scrape targets from Kubernetes resources.
          // It watches cluster state and ensures targets are continually synced with what is currently running in your cluster.
          discovery.kubernetes "pod" {
            role = "pod"
            // Restrict to pods on the node to reduce cpu & memory usage
            selectors {
              role = "pod"
              field = "spec.nodeName=" + coalesce(sys.env("HOSTNAME"), constants.hostname)
            }
          }

          // discovery.relabel rewrites the label set of the input targets by applying one or more relabeling rules.
          // If no rules are defined, then the input targets are exported as-is.
          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pod.targets

            // Label creation - "namespace" field from "__meta_kubernetes_namespace"
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              action = "replace"
              target_label = "namespace"
            }

            // Label creation - "pod" field from "__meta_kubernetes_pod_name"
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              action = "replace"
              target_label = "pod"
            }

            // Label creation - "container" field from "__meta_kubernetes_pod_container_name"
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              action = "replace"
              target_label = "container"
            }

            // Label creation -  "app" field from "__meta_kubernetes_pod_label_app_kubernetes_io_name"
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              action = "replace"
              target_label = "app"
            }

            // Label creation -  "job" field from "__meta_kubernetes_namespace" and "__meta_kubernetes_pod_container_name"
            // Concatenate values __meta_kubernetes_namespace/__meta_kubernetes_pod_container_name
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
              action = "replace"
              target_label = "job"
              separator = "/"
              replacement = "$1"
            }

            // Label creation - "__path__" field from "__meta_kubernetes_pod_uid" and "__meta_kubernetes_pod_container_name"
            // Concatenate values __meta_kubernetes_pod_uid/__meta_kubernetes_pod_container_name.log
            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              action = "replace"
              target_label = "__path__"
              separator = "/"
              replacement = "/var/log/pods/*$1/*.log"
            }

            // Label creation -  "container_runtime" field from "__meta_kubernetes_pod_container_id"
            rule {
              source_labels = ["__meta_kubernetes_pod_container_id"]
              action = "replace"
              target_label = "container_runtime"
              regex = "^(\\S+):\\/\\/.+$"
              replacement = "$1"
            }
          }

          // loki.source.kubernetes tails logs from Kubernetes containers using the Kubernetes API.
          loki.source.kubernetes "pod_logs" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.process.pod_logs.receiver]
          }

          // loki.process receives log entries from other Loki components, applies one or more processing stages,
          // and forwards the results to the list of receivers in the component's arguments.
          loki.process "pod_logs" {
            stage.static_labels {
                values = {
                  cluster = "wilsonfi-prod",
                }
            }

            forward_to = [loki.write.default.receiver]
          }
          // loki.source.kubernetes_events tails events from the Kubernetes API and converts them
          // into log lines to forward to other Loki components.
          loki.source.kubernetes_events "cluster_events" {
            job_name   = "integrations/kubernetes/eventhandler"
            log_format = "logfmt"
            forward_to = [
              loki.process.cluster_events.receiver,
            ]
          }

          // loki.process receives log entries from other loki components, applies one or more processing stages,
          // and forwards the results to the list of receivers in the component's arguments.
          loki.process "cluster_events" {
            forward_to = [loki.write.default.receiver]

            stage.static_labels {
              values = {
                cluster = "wilsonfi-prod",
              }
            }

            stage.labels {
              values = {
                kubernetes_cluster_events = "job",
              }
            }
          }